<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smart Career Recommendation System</title>

  <!-- Link CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- LEFT PANEL : INPUT -->
  <div class="panel left">
    <h1>Career Navigator</h1>
    <p class="subtitle">
      Discover career paths tailored to your skills, interests, and goals
    </p>

    <label>Education Level</label>
    <select id="education">
      <option value="diploma">Diploma</option>
      <option value="ug">Undergraduate</option>
      <option value="pg">Postgraduate</option>
    </select>

    <label>Primary Interest</label>
    <select id="interest">
      <option value="tech">Technology</option>
      <option value="data">Data & Analytics</option>
      <option value="health">Healthcare</option>
      <option value="business">Business</option>
    </select>

    <label>Preferred Industry</label>
    <select id="industry">
      <option value="it">IT</option>
      <option value="finance">Finance</option>
      <option value="healthcare">Healthcare</option>
      <option value="media">Media</option>
    </select>

    <label>Your Skills</label>
    <div class="skills">
      <label><input type="checkbox" value="programming" /> Programming</label>
      <label><input type="checkbox" value="analysis" /> Data Analysis</label>
      <label><input type="checkbox" value="communication" /> Communication</label>
      <label><input type="checkbox" value="creativity" /> Creativity</label>
      <label><input type="checkbox" value="leadership" /> Leadership</label>
    </div>

    <button onclick="getRecommendations()">
      Get Career Recommendations
    </button>
  </div>

  <!-- RIGHT PANEL : OUTPUT -->
  <div class="panel right">
    <div id="results">
      <p>
        Select your details on the left and generate personalized career
        recommendations here.
      </p>
    </div>
  </div>

</div>

<!-- Link JS -->
<script src="script.js"></script>
</body>
</html>
